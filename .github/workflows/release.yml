name: Build Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            use_cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            use_cross: false
          
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            use_cross: false
          
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/spark-core.exe dist/spark-core-${{ matrix.target }}.exe
            7z a dist/spark-core-${{ matrix.target }}.zip dist/spark-core-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/spark-core dist/spark-core-${{ matrix.target }}
            tar czf dist/spark-core-${{ matrix.target }}.tar.gz -C dist spark-core-${{ matrix.target }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spark-core-${{ matrix.target }}
          path: dist/*

  build-arm:
    name: Build - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/spark-core dist/spark-core-${{ matrix.target }}
          tar czf dist/spark-core-${{ matrix.target }}.tar.gz -C dist spark-core-${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spark-core-${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: [build, build-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
